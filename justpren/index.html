<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const hearts = [];
        function createHeart(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * 20 + canvas.width / 2, y: y * 20 + canvas.height / 2 };
        }
        function animate() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#800080";
            ctx.font = "70px Arial";
            for (let i = 0; i < 50; i++) {
                let t = Math.random() * Math.PI * 2;
                let pos = createHeart(t);
                ctx.fillText("niel", pos.x, pos.y);
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
