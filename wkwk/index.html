<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif; }
        canvas { display: block; }
        #playButton { position: absolute; z-index: 10; padding: 20px 40px; font-size: 24px; cursor: pointer; background: #ff69b4; border: none; border-radius: 15px; color: white; }
    </style>
</head>
<body>
    <button id="playButton">KLIK UNTUK MULAI</button>
    <audio id="myAudio" loop>
        <source src="https://files.catbox.moe/k1s2u3.mp3" type="audio/mpeg">
    </audio>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const playButton = document.getElementById("playButton");
        const audio = document.getElementById("myAudio");

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff69b4";
            ctx.font = "15px Arial";
            
            // Loop untuk membuat banyak titik membentuk love
            for (let i = 0; i < 50; i++) {
                let t = Math.random() * Math.PI * 2;
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                ctx.fillText("niel", x * 20 + canvas.width / 2, y * 20 + canvas.height / 2);
            }
            requestAnimationFrame(draw);
        }

        playButton.addEventListener("click", () => {
            audio.play();
            playButton.style.display = "none";
            draw();
        });
    </script>
</body>
</html
