<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif; }
        canvas { display: block; }
        #handle { position: absolute; bottom: 20px; left: 20px; font-size: 18px; color: #ff69b4; }
    </style>
</head>
<body>
    <div id="handle">@danielllbroo</div>
    
    <audio id="myAudio" loop autoplay>
        <source src="https://www.mboxdrive.com/love%20you%20trend.mp3" type="audio/mpeg">
    </audio>

    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function createHeart(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            return { x: x * 15 + canvas.width / 2, y: y * 15 + canvas.height / 2 };
        }

        function animate() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff69b4";
            ctx.font = "20px Arial";
            for (let i = 0; i < 30; i++) {
                let t = Math.random() * Math.PI * 2;
                let pos = createHeart(t);
                ctx.fillText("niel", pos.x, pos.y);
            }
            setTimeout(() => { requestAnimationFrame(animate); }, 100);
        }
        animate();
    </script>
</body>
</htm
